<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top"> 
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>สถิตินักเรียนประจำวัน</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .room-card { 
      padding: 4px 10px; 
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
    }
    .status-done { 
      background-color: white; 
      border-left: 4px solid #10b981; 
      box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
    }
    .status-pending { 
      background-color: #fee2e2; 
      border-left: 4px solid #ef4444; 
    }
    .total-num { font-size: 0.75rem; color: #64748b; margin-right: 6px; font-weight: 400; }
    
    .stat-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4px; border-radius: 6px; }
    .stat-label { font-size: 10px; opacity: 0.8; margin-bottom: 2px; }
    .stat-val { font-size: 1.1rem; font-weight: bold; line-height: 1; }
    .stat-pct { font-size: 9px; opacity: 0.7; margin-top: 2px; }
  </style>
</head>
<body class="p-2 pb-10">
  <div class="max-w-5xl mx-auto">
    
<div class="flex justify-between items-center mb-3 bg-white p-2 rounded-lg shadow-sm border border-gray-100 min-h-[44px]">
      <h1 class="text-base font-bold text-gray-800 tracking-tight">สถิติประจำวัน</h1>
      
      <div class="relative flex items-center justify-end">
        <svg id="loading-spinner" class="animate-spin h-5 w-5 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        
<select id="date-input" onchange="loadDashboard()" class="hidden border border-gray-300 rounded-lg px-3 py-1.5 text-sm md:text-base font-medium outline-none bg-white text-blue-700 shadow-sm cursor-pointer focus:ring-2 focus:ring-blue-500 w-auto min-w-[180px]">
        </select>
      </div>
    </div>

    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 mb-3">
      <h2 class="text-sm font-bold text-gray-800 border-b pb-2 mb-2">ภาพรวมระดับโรงเรียน</h2>
      <div id="school-summary" class="grid grid-cols-5 gap-1 text-white">
         </div>
    </div>

    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 mb-3">
      <h2 class="text-sm font-bold text-gray-800 border-b pb-2 mb-2">ภาพรวมระดับสายชั้น</h2>
      <div id="grade-summary" class="space-y-2">
         </div>
    </div>

    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100">
      <h2 class="text-sm font-bold text-gray-800 border-b pb-2 mb-2">ระดับห้องเรียน</h2>
      <div id="room-list" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2">
         </div>
    </div>

  </div>

  <script>
document.addEventListener("DOMContentLoaded", () => {
      fetchAvailableDates();
    });

    async function fetchAvailableDates() {
      const spinner = document.getElementById('loading-spinner');
      const dateInput = document.getElementById('date-input');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'getAvailableDates' })
        });
        const data = await response.json();

        if (data.status === 'success' && data.dates.length > 0) {
          dateInput.innerHTML = data.dates.map(d => `<option value="${d}">${d}</option>`).join('');
          
          // โหลดข้อมูล Dashboard ทันทีโดยใช้วันล่าสุด (อยู่บนสุดของ select)
          loadDashboard();
        } else {
          dateInput.innerHTML = `<option value="">ไม่มีข้อมูล</option>`;
          spinner.classList.add('hidden');
          dateInput.classList.remove('hidden');
        }
      } catch (error) {
        console.error("Error fetching dates:", error);
        spinner.classList.add('hidden');
        dateInput.classList.remove('hidden');
      }
    }

    function getPct(val, total) {
      if (!total || total === 0) return "0%";
      return ((val / total) * 100).toFixed(1) + "%";
    }

    function renderStatHTML(dataObj) {
      return `
        <div class="stat-box bg-blue-600">
          <div class="stat-label">ทั้งหมด</div>
          <div class="stat-val">${dataObj.all}</div>
          <div class="stat-pct">100%</div>
        </div>
        <div class="stat-box bg-green-500">
          <div class="stat-label">มา</div>
          <div class="stat-val">${dataObj.pr}</div>
          <div class="stat-pct">${getPct(dataObj.pr, dataObj.all)}</div>
        </div>
        <div class="stat-box bg-yellow-500 text-yellow-900">
          <div class="stat-label">ป่วย</div>
          <div class="stat-val">${dataObj.sick}</div>
          <div class="stat-pct">${getPct(dataObj.sick, dataObj.all)}</div>
        </div>
        <div class="stat-box bg-orange-500">
          <div class="stat-label">ลา</div>
          <div class="stat-val">${dataObj.leave}</div>
          <div class="stat-pct">${getPct(dataObj.leave, dataObj.all)}</div>
        </div>
        <div class="stat-box bg-red-500">
          <div class="stat-label">ขาด</div>
          <div class="stat-val">${dataObj.ab}</div>
          <div class="stat-pct">${getPct(dataObj.ab, dataObj.all)}</div>
        </div>
      `;
    }

const API_URL = "https://script.google.com/macros/s/AKfycbxQY93WwudLzvhP4cKn0-uxSg5Jh390j3Ju7AygHyD96V5yd0ulZ-DWQJt8gEeeJmv8/exec"; // ใช้ URL เดียวกับไฟล์ JS หลัก

async function loadDashboard() {
      const dateInput = document.getElementById('date-input');
      const spinner = document.getElementById('loading-spinner');
      const selectedDate = dateInput.value;
      
      if (!selectedDate) return;

      // แสดง Spinner / ซ่อน Dropdown
      dateInput.classList.add('hidden');
      spinner.classList.remove('hidden');

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'getDashboard', date: selectedDate })
        });
        const data = await response.json();

        // 1. ภาพรวมโรงเรียน
        document.getElementById('school-summary').innerHTML = renderStatHTML(data.school);

        // 2. ภาพรวมสายชั้น
        document.getElementById('grade-summary').innerHTML = data.grades.map(g => `
          <div class="border rounded-md p-2 bg-gray-50">
            <div class="text-xs font-bold text-gray-700 mb-1">${g.grade}</div>
            <div class="grid grid-cols-5 gap-1 text-white">
              ${renderStatHTML(g)}
            </div>
          </div>
        `).join('');

        // 3. ระดับห้องเรียน
        document.getElementById('room-list').innerHTML = data.rooms.map(r => {
          let totalAbsent = r.sick + r.leave + r.ab; 
          return `
          <div class="room-card ${r.status === 'done' ? 'status-done' : 'status-pending'}">
            <div class="text-sm font-bold text-gray-700">${r.room}</div>
            <div class="flex items-center">
               <span class="total-num">(${r.total})</span>
               <div class="flex gap-3">
                 <span class="text-lg font-bold ${r.status === 'done' ? 'text-green-600' : 'text-red-300'}">${r.status === 'done' ? r.pr : '-'}</span>
                 <span class="text-lg font-bold ${r.status === 'done' ? 'text-red-500' : 'text-red-300'}">${r.status === 'done' ? totalAbsent : '-'}</span>
               </div>
            </div>
          </div>
        `}).join('');

} catch (error) {
        console.error("Error loading dashboard:", error);
      } finally {
        // ซ่อน Spinner / แสดง Dropdown
        spinner.classList.add('hidden');
        dateInput.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
